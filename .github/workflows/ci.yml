name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: Unit tests
        run: go test ./... -race -count=1

  integration-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nsys
          POSTGRES_PASSWORD: nsys
          POSTGRES_DB: nsys
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nsys -d nsys"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      DB_DSN: postgres://nsys:nsys@localhost:5432/nsys?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.17.1
      - name: Run migrations
        run: migrate -path ./migrations -database "$DB_DSN" up
      - name: Integration tests
        run: go test ./... -tags=integration -race -count=1
